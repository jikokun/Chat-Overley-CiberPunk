<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass Aqua Neon Chat - Edición Final</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="phone-container">
    <div class="phone-status-bar">
      <div class="phone-notch"></div>
      <div class="phone-status-icons">
        <span class="icon-wifi">📶</span>
        <span class="icon-battery">🔋 86%</span>
      </div>
    </div>

    <div class="chat-area" id="chat-container">
      </div>

    <div class="typing-indicator" id="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>

    <div class="phone-bottom-bar">
      <div class="simulated-input">type your message</div>
      <div class="simulated-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

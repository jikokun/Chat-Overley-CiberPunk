<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass Aqua Neon Chat - Edición Final</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="phone-container">
    <div class="phone-status-bar">
      <div class="phone-notch"></div>
      <div class="phone-status-icons">
        <svg class="icon-wifi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
          <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.94 0"></path>
          <circle cx="12" cy="20" r="1" fill="currentColor"></circle>
        </svg>
        <span class="icon-battery">🔋 86%</span>
      </div>
    </div>

    <!-- Integración de la Isla Dinámica de Spotify -->
    <div class="spotify-island-container">
      <iframe src="widget spotify mio.html" class="spotify-widget-frame" frameborder="0"></iframe>
    </div>

    <div class="chat-area" id="chat-container">
      </div>

    <div class="typing-indicator" id="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>

    <div class="phone-bottom-bar">
      <div class="simulated-input">type your message</div>
      <div class="simulated-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

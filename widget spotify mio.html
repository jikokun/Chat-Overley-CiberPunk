<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spotify Dynamic Island - Glow Edition</title>
    <script src="https://assets.codepen.io/3256958/vibrant.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

        :root {
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --dynamic-color: #00cfa1; 
            --dynamic-rgb: 0, 207, 161;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Contenedor pegado arriba */
        .island-wrapper {
            position: fixed;
            top: 22px; /* Bajamos un poco el wrapper interno para dar aire al texto flotante */
            left: 50%;
            transform: translateX(-50%);
            opacity: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Entrada: Deslizar hacia abajo (Bandeja de notificaciones) */
            animation: slideDownNotification 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        
        .island-wrapper.hidden {
            /* Salida: Efecto "Squeeze & Swipe" (Apretar y deslizar) mediante Animación */
            animation: slideOutSwipe 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideDownNotification {
            0% {
                transform: translateX(-50%) translateY(-60px);
                opacity: 0;
            }
            100% {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideOutSwipe {
            0% {
                transform: translateX(-50%) translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateX(150%) translateY(0) rotate(25deg) scale(0.7);
                opacity: 0;
            }
        }

        /* --- TEXTO "REPRODUCIENDO" FLOTANTE --- */
        .now-playing-label {
            position: absolute;
            top: -20px; /* Lo subimos para que quede centrado sobre la bocina negra */
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Toma el color del disco y brilla */
            color: var(--dynamic-color);
            text-shadow: 0 0 10px rgba(var(--dynamic-rgb), 0.8);
            transition: all 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 5;
        }

        /* Cuando la isla se cierra, el texto se vuelve blanco, pequeño y sutil */
        .island.closed ~ .now-playing-label {
            top: -18px; /* También lo subimos en el estado cerrado */
            font-size: 9px;
            color: #ffffff;
            text-shadow: none;
            opacity: 0.6;
        }

        /* --- LA ISLA PRINCIPAL --- */
        .island {
            /* Transparencia leve con efecto de cristal esmerilado (Blur) */
            background-color: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            
            border: 2px solid var(--dynamic-color);
            border-radius: 36px;
            display: flex;
            align-items: center;
            position: relative;
            padding: 8px;
            
            width: 280px;
            height: 52px;
            transition: all 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2; /* Mantiene la isla sobre el resplandor */
        }

        /* --- EL RESPLANDOR ANIMADO (MAGIA CSS) --- */
        .island::before {
            content: '';
            position: absolute;
            /* Se expande un poco más allá de la isla para verse como sombra */
            inset: -4px; 
            border-radius: 40px;
            /* Degradado que viaja usando el color dinámico */
            background: linear-gradient(90deg, transparent, var(--dynamic-color), transparent, var(--dynamic-color));
            background-size: 200% 200%;
            filter: blur(10px);
            z-index: -1;
            animation: moveGlow 2.5s linear infinite;
            opacity: 0.85;
            transition: all 0.7s ease;
        }

        @keyframes moveGlow {
            0% { background-position: 200% 50%; }
            100% { background-position: -200% 50%; }
        }

        /* --- LA ISLA (ESTADO CERRADO / MINIMALISTA) --- */
        .island.closed {
            width: 150px; 
            height: 25px; 
            padding: 4px 8px 4px 4px;
            border-radius: 30px;
        }

        /* El resplandor se adapta a la píldora y se vuelve más suave */
        .island.closed::before {
            inset: -2px;
            border-radius: 34px;
            filter: blur(6px);
            opacity: 0.5;
        }

        /* Portada del disco */
        .cover {
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            width: 38px;
            height: 38px;
            margin-right: 10px;
        }

        .island.closed .cover {
            width: 18px;
            height: 18px;
            border-radius: 50%; 
            margin-right: 10px;
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            overflow: hidden;
            white-space: nowrap;
        }

        /* --- LÓGICA DE COLORES DEL TEXTO --- */
        /* Nombre de la Canción (Estado Expandido: Color Dinámico) */
        .song-name {
            color: var(--dynamic-color);
            font-weight: 700;
            font-size: 14px;
            text-overflow: ellipsis;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* Canción (Estado Cerrado: Color Blanco Puro) */
        .island.closed .song-name {
            color: #ffffff; 
            font-size: 11px;
            font-weight: 600;
        }

        /* Nombre del Artista */
        .artist-name {
            color: var(--text-sub);
            font-size: 12px;
            font-weight: 400;
            margin-top: 4px;
            text-overflow: ellipsis;
            overflow: hidden;
            transition: all 0.4s ease;
            opacity: 1;
            max-height: 20px;
        }

        .island.closed .artist-name {
            opacity: 0;
            max-height: 0;
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div id="wrapper" class="island-wrapper hidden">
        <div id="island" class="island closed">
            <div class="cover">
                <img id="albumCover" src="" crossorigin="anonymous" />
            </div>
            <div class="info">
                <div id="name" class="song-name">Cargando...</div>
                <div id="artists" class="artist-name">Spotify</div>
            </div>
        </div>
        <!-- El texto ahora va fuera de la isla, pero dentro del wrapper -->
        <div class="now-playing-label">Reproduciendo</div>
    </div>

    <script>
        // ==========================================
        // CREDENCIALES PRIVADAS
        // ==========================================
        const usuario = 'jikokun2';
        let access_token = 'BQDCLNPIlR4NDtuVtW3AdZYkM2w8KYFShiZOIo3VnywT2ZSBDXfHRuuShd2jLbifdAsVK9AIG8CKilQvJI8MJFFAJS9pW-Lpd34Ew5_uHCW4qmDtl9T_n3mE6Bnwd3uFWFDZrKEBf-aAXu0F2JIq75IhyYfnnclU6izn77lnwGUyzHOlygFaXvbEEo6z4GBoqq-fmhQspIqMAeVlen7zOwxDAtYk7-34B081SPs5KV6Xx0-qoFPi_iea1SM2upx9DPfGovz-9H9wUgsCxAeh5qTyFUKFcm9cAqoEU2QHuPs';
        const refresh_token = 'AQBnM-Gd69K9yF7n7Ba5yZ-eSHYY2P_g6sxuMwnjpqVkPnzJqsF5BtrgdK4cSda-09WEFMJErc86DTZ2Q4v5XL3-Yxqyaf2Vu9L-HWcVFrwgQ6kX1aRY--KLX7OwZTO7TlM';

        // ==========================================
        // VARIABLES DE CONTROL
        // ==========================================
        let lastSongId = "";
        let isWidgetVisible = false;
        let pauseTimeout = null;
        let islandShrinkTimeout = null;

        const island = document.getElementById('island');
        const wrapper = document.getElementById('wrapper');

        // ==========================================
        // LÓGICA DE AUTO-OCULTADO (10s PAUSA)
        // ==========================================
        function handlePause() {
            if (!pauseTimeout && isWidgetVisible) {
                pauseTimeout = setTimeout(() => {
                    wrapper.classList.add('hidden');
                    isWidgetVisible = false;
                }, 10000); 
            }
        }

        function handlePlay() {
            if (pauseTimeout) {
                clearTimeout(pauseTimeout);
                pauseTimeout = null;
            }
            if (!isWidgetVisible) {
                wrapper.classList.remove('hidden');
                isWidgetVisible = true;
            }
        }

        // ==========================================
        // ANIMACIÓN DE LA ISLA
        // ==========================================
        function triggerIslandAnimation() {
            island.classList.remove('closed');
            
            if(islandShrinkTimeout) clearTimeout(islandShrinkTimeout);
            
            islandShrinkTimeout = setTimeout(() => {
                island.classList.add('closed');
            }, 8000); 
        }

        // ==========================================
        // EXTRACCIÓN DE COLORES (VIBRANT.JS)
        // ==========================================
        function applyDynamicColors(imageUrl) {
            Vibrant.from(imageUrl).getPalette().then(palette => {
                let colorHex = palette.Vibrant ? palette.Vibrant.getHex() : '#00cfa1';
                
                document.documentElement.style.setProperty('--dynamic-color', colorHex);
                
                // Conversión de HEX a RGB para la sombra del texto
                let r = parseInt(colorHex.slice(1, 3), 16),
                    g = parseInt(colorHex.slice(3, 5), 16),
                    b = parseInt(colorHex.slice(5, 7), 16);
                document.documentElement.style.setProperty('--dynamic-rgb', `${r}, ${g}, ${b}`);
            }).catch(err => {
                document.documentElement.style.setProperty('--dynamic-color', '#00cfa1');
                document.documentElement.style.setProperty('--dynamic-rgb', '0, 207, 161');
            });
        }

        // ==========================================
        // CONEXIÓN A SPOTIFY API
        // ==========================================
        async function checkSpotifyPlayer() {
            try {
                const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing?additional_types=episode', {
                    headers: { 'Authorization': `Bearer ${access_token}` }
                });

                if (res.status === 401) {
                    await refreshSpotifyToken();
                    return;
                }

                if (res.status === 204) {
                    handlePause();
                    return;
                }

                if (res.status === 200) {
                    const data = await res.json();
                    
                    if (!data.is_playing) {
                        handlePause();
                    } else {
                        handlePlay();
                        
                        if (data.item && data.item.id !== lastSongId) {
                            lastSongId = data.item.id;
                            
                            const songName = data.item.name || "Desconocido";
                            const artistName = (data.item.artists && data.item.artists[0]) ? data.item.artists[0].name : "Artista";
                            const albumCoverUrl = (data.item.album && data.item.album.images) ? data.item.album.images[0].url : "https://mrboostlive.com/mrboostlogo.png";

                            document.getElementById('name').textContent = songName;
                            document.getElementById('artists').textContent = artistName;
                            document.getElementById('albumCover').src = albumCoverUrl;

                            applyDynamicColors(albumCoverUrl);
                            triggerIslandAnimation();
                        }
                    }
                }
            } catch (e) {
                console.error("Error consultando Spotify:", e);
            }
        }

        async function refreshSpotifyToken() {
            try {
                const res = await fetch('https://mrboostlive.com/spotify/refresh_token.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `user_id=${encodeURIComponent(usuario)}&refresh_token=${encodeURIComponent(refresh_token)}`
                });
                const newToken = await res.text();
                if (newToken && !newToken.includes("<")) { 
                    access_token = newToken;
                    checkSpotifyPlayer(); 
                }
            } catch (error) {
                console.error("Error renovando token:", error);
            }
        }

        // ==========================================
        // INICIO DEL BUCLE
        // ==========================================
        checkSpotifyPlayer();
        setInterval(checkSpotifyPlayer, 3000); 

    </script>
</body>
</html>
